<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#faf8f5" media="(prefers-color-scheme: light)">
<title>FilterCoffee</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --bg-card: #ffffff;
  --bg-card-alt: #f5f1ec;
  --bg-input: #f0ece6;
  --text: #1a1a1a;
  --text-secondary: #6b6560;
  --text-tertiary: #9e9890;
  --accent: #c45e3a;
  --accent-light: #f0d8cc;
  --accent-dark: #a04828;
  --border: #e8e2da;
  --border-light: #f0ece6;
  --shadow: rgba(0,0,0,0.06);
  --shadow-md: rgba(0,0,0,0.1);
  --star: #e8a838;
  --success: #4a9e6a;
  --danger: #c45050;
  --tab-bg: rgba(255,255,255,0.85);
  --click-btn: #e8e2da;
  --click-btn-active: #c45e3a;
  --click-btn-text: #1a1a1a;
  --click-btn-active-text: #ffffff;
  --modal-overlay: rgba(0,0,0,0.4);
  --tag-bg: #f0ece6;
  --tag-text: #6b6560;
  --chart-bar: #c45e3a;
  --chart-bar-light: #f0d8cc;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #121210;
    --bg-card: #1e1e1c;
    --bg-card-alt: #2a2a27;
    --bg-input: #2a2a27;
    --text: #ede8e2;
    --text-secondary: #a09a92;
    --text-tertiary: #706a62;
    --accent: #d4714e;
    --accent-light: #3d2820;
    --accent-dark: #e8845e;
    --border: #333330;
    --border-light: #2a2a27;
    --shadow: rgba(0,0,0,0.2);
    --shadow-md: rgba(0,0,0,0.3);
    --tab-bg: rgba(30,30,28,0.9);
    --click-btn: #2a2a27;
    --click-btn-active: #d4714e;
    --click-btn-text: #ede8e2;
    --click-btn-active-text: #ffffff;
    --modal-overlay: rgba(0,0,0,0.6);
    --tag-bg: #2a2a27;
    --tag-text: #a09a92;
    --chart-bar: #d4714e;
    --chart-bar-light: #3d2820;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── Click Bar (Top Fixed) ─── */
.click-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: env(safe-area-inset-top, 12px) 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.click-bar-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
.click-bar-value { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; color: var(--accent); line-height: 1; }
.click-bar-unit { font-size: 14px; color: var(--text-tertiary); margin-left: 4px; }
.click-bar-right { text-align: right; }
.click-bar-bean { font-size: 12px; color: var(--text-tertiary); max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── Main Content ─── */
.app-content {
  padding-top: calc(env(safe-area-inset-top, 12px) + 76px);
  padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  min-height: 100dvh;
}

.page { display: none; padding: 16px 20px; animation: fadeIn 0.2s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ─── Tab Bar ─── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--tab-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 6px 0; border: none; background: none; color: var(--text-tertiary);
  font-size: 10px; font-family: 'DM Sans', sans-serif; font-weight: 500;
  cursor: pointer; transition: color 0.2s;
}
.tab.active { color: var(--accent); }
.tab svg { width: 22px; height: 22px; }

/* ─── Common Styles ─── */
.section-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
.section-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  transition: box-shadow 0.2s;
}
.card:active { box-shadow: 0 2px 12px var(--shadow-md); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px; border-radius: 12px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; width: 100%;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:active { background: var(--accent-dark); transform: scale(0.98); }
.btn-secondary { background: var(--bg-input); color: var(--text); }
.btn-secondary:active { background: var(--border); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }

.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
.input-group input, .input-group select, .input-group textarea {
  width: 100%; padding: 12px 14px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--bg-input);
  font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text);
  outline: none; transition: border-color 0.2s;
}
.input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: var(--accent); }
.input-group textarea { resize: vertical; min-height: 80px; }

.tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; background: var(--tag-bg); color: var(--tag-text); margin: 2px 4px 2px 0; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
.empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-state p { font-size: 15px; }

/* ─── Click Buttons ─── */
.click-grid {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 20px 0;
}
.click-btn {
  width: 64px; height: 64px; border-radius: 16px; border: 2px solid var(--border);
  background: var(--click-btn); color: var(--click-btn-text);
  font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.click-btn.active {
  background: var(--click-btn-active); color: var(--click-btn-active-text);
  border-color: var(--click-btn-active); transform: scale(1.08);
  box-shadow: 0 4px 16px rgba(196,94,58,0.3);
}
.click-btn:active { transform: scale(0.95); }

.click-history { margin-top: 24px; }
.click-history-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid var(--border-light);
  font-size: 14px;
}
.click-history-item:last-child { border-bottom: none; }
.click-history-clicks { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 18px; color: var(--accent); }
.click-history-date { color: var(--text-tertiary); font-size: 13px; }
.click-history-bean { color: var(--text-secondary); font-size: 13px; }

/* ─── Recipe Card ─── */
.recipe-card { cursor: pointer; }
.recipe-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.recipe-card-name { font-size: 16px; font-weight: 700; line-height: 1.3; }
.recipe-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.recipe-card-meta { font-size: 13px; color: var(--text-tertiary); margin-top: 8px; }

/* ─── Brew Log ─── */
.brew-card { cursor: pointer; }
.brew-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.brew-card-bean { font-size: 15px; font-weight: 600; }
.brew-card-date { font-size: 13px; color: var(--text-tertiary); }
.brew-card-info { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.brew-card-stars { color: var(--star); font-size: 14px; margin-top: 6px; }
.brew-card-note { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; font-style: italic; }

/* ─── Stars ─── */
.star-rating { display: flex; gap: 6px; }
.star-rating span {
  font-size: 28px; cursor: pointer; color: var(--border);
  transition: color 0.15s, transform 0.15s;
}
.star-rating span.filled { color: var(--star); }
.star-rating span:active { transform: scale(1.2); }

/* ─── Stats ─── */
.stat-number { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; color: var(--accent); }
.stat-label { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; }

.chart-bar-container { margin-bottom: 8px; }
.chart-bar-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: flex; justify-content: space-between; }
.chart-bar-track { height: 24px; background: var(--chart-bar-light); border-radius: 8px; overflow: hidden; }
.chart-bar-fill { height: 100%; background: var(--chart-bar); border-radius: 8px; transition: width 0.6s ease; min-width: 2px; }

.year-month-selector { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.year-month-selector select {
  padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg-input); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
}

/* ─── Modal ─── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: var(--modal-overlay);
  align-items: flex-end; justify-content: center;
  animation: fadeOverlay 0.2s ease;
}
.modal-overlay.active { display: flex; }
@keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-card);
  border-radius: 20px 20px 0 0;
  width: 100%; max-width: 500px;
  max-height: 85dvh; overflow-y: auto;
  padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 20px; font-weight: 700; }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: var(--bg-input); color: var(--text-secondary);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ─── Filter Bar ─── */
.filter-bar {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 8px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg-card);
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ─── Search ─── */
.search-bar {
  position: relative; margin-bottom: 16px;
}
.search-bar input {
  width: 100%; padding: 12px 14px 12px 40px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--bg-input);
  font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); outline: none;
}
.search-bar svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--text-tertiary); }

/* ─── Textarea for paste ─── */
.paste-area {
  width: 100%; min-height: 120px; padding: 14px; border-radius: 12px;
  border: 2px dashed var(--border); background: var(--bg-input);
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text);
  outline: none; resize: vertical; transition: border-color 0.2s;
}
.paste-area:focus { border-color: var(--accent); }
.paste-area::placeholder { color: var(--text-tertiary); }

/* ─── Recipe Detail ─── */
.recipe-detail-section { margin-bottom: 20px; }
.recipe-detail-section h3 { font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.recipe-detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 14px; }
.recipe-detail-row:last-child { border-bottom: none; }
.recipe-detail-label { color: var(--text-secondary); }
.recipe-detail-value { font-weight: 600; text-align: right; max-width: 60%; }

.pour-step { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
.pour-step:last-child { border-bottom: none; }
.pour-step-time { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--accent); min-width: 40px; }
.pour-step-amount { font-family: 'DM Mono', monospace; font-weight: 600; min-width: 50px; }
.pour-step-action { color: var(--text-secondary); flex: 1; }

.adjust-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
.adjust-row:last-child { border-bottom: none; }
.adjust-symptom { font-weight: 600; min-width: 80px; }
.adjust-fix { color: var(--text-secondary); }

/* ─── Group Header ─── */
.group-header { font-size: 14px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; padding: 20px 0 8px; }

.delete-zone { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<!-- ─── Click Bar ─── -->
<div class="click-bar">
  <div>
    <div class="click-bar-label">C60 Clicks</div>
    <div><span class="click-bar-value" id="currentClickDisplay">--</span><span class="click-bar-unit">clicks</span></div>
  </div>
  <div class="click-bar-right">
    <div class="click-bar-bean" id="currentBeanDisplay">설정되지 않음</div>
  </div>
</div>

<!-- ─── App Content ─── -->
<div class="app-content">

  <!-- Tab: Clicks -->
  <div class="page active" id="page-clicks">
    <h1 class="section-title">클릭수 설정</h1>
    <p class="section-sub">현재 그라인더 클릭수를 선택하세요</p>
    <div class="click-grid" id="clickGrid"></div>
    
    <div class="input-group" style="margin-top:20px;">
      <label>원두 메모 (선택)</label>
      <input type="text" id="clickBeanInput" placeholder="예: 에티오피아 예가체프 워시드">
    </div>
    
    <div class="click-history">
      <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">히스토리</h3>
      <div id="clickHistory"></div>
    </div>
  </div>

  <!-- Tab: Recipes -->
  <div class="page" id="page-recipes">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h1 class="section-title" style="margin-bottom:0;">레시피</h1>
      <button class="btn btn-primary btn-sm" onclick="openAddRecipeModal()">+ 추가</button>
    </div>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="원두, 산지, 품종 검색..." id="recipeSearch" oninput="renderRecipes()">
    </div>
    <div class="filter-bar" id="recipeFilters"></div>
    <div id="recipeList"></div>
  </div>

  <!-- Tab: Brew Log -->
  <div class="page" id="page-brews">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h1 class="section-title" style="margin-bottom:0;">추출 기록</h1>
      <button class="btn btn-primary btn-sm" onclick="openAddBrewModal()">+ 기록</button>
    </div>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="검색..." id="brewSearch" oninput="renderBrews()">
    </div>
    <div class="filter-bar" id="brewFilters"></div>
    <div id="brewList"></div>
  </div>

  <!-- Tab: Stats -->
  <div class="page" id="page-stats">
    <h1 class="section-title">통계</h1>
    <div class="year-month-selector">
      <select id="statYear" onchange="renderStats()"></select>
      <select id="statMonth" onchange="renderStats()">
        <option value="all">전체</option>
        <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
        <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
        <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
        <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
      </select>
    </div>
    <div id="statsContent"></div>
  </div>

  <!-- Tab: Settings -->
  <div class="page" id="page-settings">
    <h1 class="section-title">설정</h1>
    
    <div class="card">
      <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">데이터 백업</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">JSON 파일로 데이터를 내보내거나 가져올 수 있습니다.</p>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="exportData()" style="flex:1;">내보내기</button>
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" style="flex:1;">가져오기</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>

    <div class="card">
      <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">클릭수 범위 설정</h3>
      <div style="display:flex;gap:8px;">
        <div class="input-group" style="flex:1;">
          <label>최소</label>
          <input type="number" id="clickMin" value="28" onchange="saveClickRange()">
        </div>
        <div class="input-group" style="flex:1;">
          <label>최대</label>
          <input type="number" id="clickMax" value="34" onchange="saveClickRange()">
        </div>
      </div>
    </div>

    <div class="card">
      <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">데이터 초기화</h3>
      <button class="btn btn-danger" onclick="confirmClearData()">전체 데이터 삭제</button>
    </div>

    <div style="text-align:center;margin-top:40px;color:var(--text-tertiary);font-size:12px;">
      FilterCoffee v1.0<br>Made with ☕
    </div>
  </div>

</div>

<!-- ─── Tab Bar ─── -->
<div class="tab-bar">
  <button class="tab active" data-page="clicks" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m10-10h-4M6 12H2m15.07-5.07l-2.83 2.83M9.76 14.24l-2.83 2.83m11.14 0l-2.83-2.83M9.76 9.76L6.93 6.93"/></svg>
    클릭수
  </button>
  <button class="tab" data-page="recipes" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    레시피
  </button>
  <button class="tab" data-page="brews" onclick="switchTab(this)">

<script>
// ─── Data Store ───
const DB_KEY = 'filterCoffee';
let data = loadData();
let currentBrewRating = 0;
let selectedRecipeId = null;
let selectedBrewId = null;
let activeBrewFilter = 'all';
let activeRecipeFilter = 'all';

function loadData() {
  const saved = localStorage.getItem(DB_KEY);
  if (saved) return JSON.parse(saved);
  return {
    currentClicks: null,
    currentBean: '',
    clickRange: { min: 28, max: 34 },
    clickHistory: [],
    recipes: [],
    brews: []
  };
}

function saveData() {
  localStorage.setItem(DB_KEY, JSON.stringify(data));
}

// ─── Tab Navigation ───
function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-' + el.dataset.page).classList.add('active');
  
  if (el.dataset.page === 'stats') renderStats();
  if (el.dataset.page === 'recipes') renderRecipes();
  if (el.dataset.page === 'brews') renderBrews();
}

// ─── Click Tracker ───
function renderClickGrid() {
  const grid = document.getElementById('clickGrid');
  const min = data.clickRange.min;
  const max = data.clickRange.max;
  grid.innerHTML = '';
  for (let i = min; i <= max; i++) {
    const btn = document.createElement('button');
    btn.className = 'click-btn' + (data.currentClicks === i ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => setClicks(i);
    grid.appendChild(btn);
  }
}

function setClicks(n) {
  const bean = document.getElementById('clickBeanInput').value.trim();
  data.currentClicks = n;
  data.currentBean = bean;
  data.clickHistory.unshift({
    clicks: n,
    bean: bean,
    date: new Date().toISOString()
  });
  if (data.clickHistory.length > 100) data.clickHistory.pop();
  saveData();
  updateClickBar();
  renderClickGrid();
  renderClickHistory();
}

function updateClickBar() {
  document.getElementById('currentClickDisplay').textContent = data.currentClicks ?? '--';
  document.getElementById('currentBeanDisplay').textContent = data.currentBean || '설정되지 않음';
}

function renderClickHistory() {
  const container = document.getElementById('clickHistory');
  if (!data.clickHistory.length) {
    container.innerHTML = '<div class="empty-state"><p>아직 기록이 없습니다</p></div>';
    return;
  }
  container.innerHTML = data.clickHistory.slice(0, 20).map(h => `
    <div class="click-history-item">
      <div>
        <div class="click-history-clicks">${h.clicks}</div>
        ${h.bean ? `<div class="click-history-bean">${h.bean}</div>` : ''}
      </div>
      <div class="click-history-date">${formatDate(h.date)}</div>
    </div>
  `).join('');
}

// ─── Recipe Parser ───
function parseRecipeText(text) {
  const recipe = {
    id: Date.now().toString(),
    raw: text,
    name: '', origin: '', variety: '', processing: '', roasting: '',
    notes: '', dripper: '', bottom: '', dose: '', water: '', ratio: '',
    temp: '', grind: '', meloDrip: '', targetTime: '',
    pourGuide: [], adjustments: [], createdAt: new Date().toISOString()
  };

  // Name - first line or title
  const titleMatch = text.match(/^(.+?)(?:\s*[—\-]|$)/m);
  if (titleMatch) recipe.name = titleMatch[1].trim();

  // Bean info
  const originMatch = text.match(/산지\s+(.+)/);
  if (originMatch) recipe.origin = originMatch[1].trim();
  
  const varietyMatch = text.match(/품종\s+(.+)/);
  if (varietyMatch) recipe.variety = varietyMatch[1].trim();
  
  const procMatch = text.match(/프로세싱\s+(.+)/);
  if (procMatch) recipe.processing = procMatch[1].trim();
  
  const roastMatch = text.match(/로스팅\s+(.+)/);
  if (roastMatch) recipe.roasting = roastMatch[1].trim();
  
  const notesMatch = text.match(/(?:예상\s*노트|노트)\s+(.+)/);
  if (notesMatch) recipe.notes = notesMatch[1].trim();

  // Recipe info
  const dripperMatch = text.match(/드리퍼\s+(.+)/);
  if (dripperMatch) recipe.dripper = dripperMatch[1].trim();
  
  const bottomMatch = text.match(/바텀\s*(?:추천)?[:\s]+(\w+)/);
  if (bottomMatch) recipe.bottom = bottomMatch[1].trim();
  
  const doseMatch = text.match(/도즈\s+(\d+)g/);
  if (doseMatch) recipe.dose = doseMatch[1];
  
  const waterMatch = text.match(/물량\s+(\d+)g/);
  if (waterMatch) recipe.water = waterMatch[1];
  
  const ratioMatch = text.match(/1:(\d+)/);
  if (ratioMatch) recipe.ratio = '1:' + ratioMatch[1];
  
  const tempMatch = text.match(/수온\s+(\d+)°?C/);
  if (tempMatch) recipe.temp = tempMatch[1];
  
  const grindMatch = text.match(/(?:그라인드|클릭수?)\s+(\d+)\s*(?:클릭)?/);
  if (grindMatch) recipe.grind = grindMatch[1];
  
  const meloMatch = text.match(/멜로드립\s+(사용|미사용)/);
  if (meloMatch) recipe.meloDrip = meloMatch[1];
  
  const timeMatch = text.match(/(?:목표\s*)?추출\s*시간\s+~?(\d+:\d+)/);
  if (timeMatch) recipe.targetTime = timeMatch[1];

  // Pour guide
  const pourPattern = /(?:블루밍|[1-9]차\s*푸어|메인|3차)\s+(\d+:\d+)\s+(\d+)g\s+(\d+)g\s+(.+?)(?=\n|$)/g;
  let pourMatch;
  while ((pourMatch = pourPattern.exec(text)) !== null) {
    recipe.pourGuide.push({
      time: pourMatch[1], amount: pourMatch[2] + 'g',
      cumulative: pourMatch[3] + 'g', action: pourMatch[4].trim()
    });
  }
  
  // Simpler pour guide fallback
  if (!recipe.pourGuide.length) {
    const lines = text.split('\n');
    const pourKeywords = ['블루밍', '1차', '2차', '3차', '드로우다운'];
    lines.forEach(line => {
      if (pourKeywords.some(k => line.includes(k))) {
        const timeM = line.match(/(\d+:\d+)/);
        const amountM = line.match(/(\d+)g/);
        if (timeM) {
          recipe.pourGuide.push({
            time: timeM[1], amount: amountM ? amountM[1] + 'g' : '',
            cumulative: '', action: line.trim()
          });
        }
      }
    });
  }

  // Adjustments
  const adjPattern = /(시다|쓰다|텁텁하다|밍밍하다|너무\s*진하다)\s+(.+?)(?=\n|$)/g;
  let adjMatch;
  while ((adjMatch = adjPattern.exec(text)) !== null) {
    recipe.adjustments.push({ symptom: adjMatch[1].trim(), fix: adjMatch[2].trim() });
  }

  // Fallback name
  if (!recipe.name && recipe.origin) {
    recipe.name = [recipe.origin, recipe.variety, recipe.processing].filter(Boolean).join(' ');
  }

  return recipe;
}

function openAddRecipeModal() {
  document.getElementById('recipePasteArea').value = '';
  document.getElementById('parsePreview').innerHTML = '';
  openModal('addRecipeModal');
}

function parseAndSaveRecipe() {
  const text = document.getElementById('recipePasteArea').value.trim();
  if (!text) return;
  
  const recipe = parseRecipeText(text);
  data.recipes.unshift(recipe);
  saveData();
  closeModal('addRecipeModal');
  renderRecipes();
  
  // Update clicks if grind exists
  if (recipe.grind) {
    data.currentClicks = parseInt(recipe.grind);
    data.currentBean = recipe.name;
    updateClickBar();
    renderClickGrid();
  }
}

function renderRecipes() {
  const container = document.getElementById('recipeList');
  const search = (document.getElementById('recipeSearch')?.value || '').toLowerCase();
  
  let filtered = data.recipes.filter(r => {
    const searchMatch = !search || 
      [r.name, r.origin, r.variety, r.processing, r.dripper].some(f => (f||'').toLowerCase().includes(search));
    
    if (activeRecipeFilter === 'all') return searchMatch;
    if (['워시드','내추럴','허니'].includes(activeRecipeFilter)) return searchMatch && r.processing === activeRecipeFilter;
    return searchMatch && (r.dripper||'').includes(activeRecipeFilter);
    
    return searchMatch;
  });

  // Render filter chips
  const filters = document.getElementById('recipeFilters');
  const processings = [...new Set(data.recipes.map(r => r.processing).filter(Boolean))];
  const drippers = [...new Set(data.recipes.map(r => r.dripper?.split('—')[0]?.trim()).filter(Boolean))];
  filters.innerHTML = `
    <button class="filter-chip ${activeRecipeFilter==='all'?'active':''}" onclick="activeRecipeFilter='all';renderRecipes()">전체</button>
    ${processings.map(p => `<button class="filter-chip ${activeRecipeFilter===p?'active':''}" onclick="activeRecipeFilter='${p}';renderRecipes()">${p}</button>`).join('')}
    ${drippers.map(d => `<button class="filter-chip ${activeRecipeFilter===d?'active':''}" onclick="activeRecipeFilter='${d}';renderRecipes()">${d}</button>`).join('')}
  `;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state"><p>레시피가 없습니다<br>클로드에서 받은 레시피를 붙여넣어 추가하세요</p></div>';
    return;
  }

  container.innerHTML = filtered.map(r => `
    <div class="card recipe-card" onclick="openRecipeDetail('${r.id}')">
      <div class="recipe-card-header">
        <div class="recipe-card-name">${r.name || '이름 없음'}</div>
        ${r.grind ? `<div style="font-family:'DM Mono';font-size:16px;font-weight:600;color:var(--accent);">${r.grind}C</div>` : ''}
      </div>
      <div class="recipe-card-tags">
        ${r.processing ? `<span class="tag">${r.processing}</span>` : ''}
        ${r.roasting ? `<span class="tag">${r.roasting}</span>` : ''}
        ${r.dripper ? `<span class="tag">${r.dripper.split('—')[0].trim()}</span>` : ''}
        ${r.ratio ? `<span class="tag">${r.ratio}</span>` : ''}
      </div>
      ${r.notes ? `<div class="recipe-card-meta">${r.notes}</div>` : ''}
    </div>
  `).join('');
}

function openRecipeDetail(id) {
  selectedRecipeId = id;
  const r = data.recipes.find(x => x.id === id);
  if (!r) return;
  
  document.getElementById('recipeDetailTitle').textContent = r.name || '레시피 상세';
  
  let html = '';
  
  // Bean info
  html += '<div class="recipe-detail-section"><h3>원두 정보</h3>';
  if (r.origin) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">산지</span><span class="recipe-detail-value">${r.origin}</span></div>`;
  if (r.variety) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">품종</span><span class="recipe-detail-value">${r.variety}</span></div>`;
  if (r.processing) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">프로세싱</span><span class="recipe-detail-value">${r.processing}</span></div>`;
  if (r.roasting) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">로스팅</span><span class="recipe-detail-value">${r.roasting}</span></div>`;
  if (r.notes) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">예상 노트</span><span class="recipe-detail-value">${r.notes}</span></div>`;
  html += '</div>';
  
  // Recipe info
  html += '<div class="recipe-detail-section"><h3>레시피</h3>';
  if (r.dripper) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">드리퍼</span><span class="recipe-detail-value">${r.dripper}</span></div>`;
  if (r.dose) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">도즈</span><span class="recipe-detail-value">${r.dose}g</span></div>`;
  if (r.water) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">물량</span><span class="recipe-detail-value">${r.water}g (${r.ratio})</span></div>`;
  if (r.temp) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">수온</span><span class="recipe-detail-value">${r.temp}°C</span></div>`;
  if (r.grind) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">그라인드</span><span class="recipe-detail-value">${r.grind}클릭</span></div>`;
  if (r.meloDrip) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">멜로드립</span><span class="recipe-detail-value">${r.meloDrip}</span></div>`;
  if (r.targetTime) html += `<div class="recipe-detail-row"><span class="recipe-detail-label">목표 시간</span><span class="recipe-detail-value">${r.targetTime}</span></div>`;
  html += '</div>';
  
  // Pour guide
  if (r.pourGuide.length) {
    html += '<div class="recipe-detail-section"><h3>푸어링 가이드</h3>';
    r.pourGuide.forEach(p => {
      html += `<div class="pour-step">
        <div class="pour-step-time">${p.time}</div>
        <div class="pour-step-amount">${p.amount}</div>
        <div class="pour-step-action">${p.action}</div>
      </div>`;
    });
    html += '</div>';
  }
  
  // Adjustments
  if (r.adjustments.length) {
    html += '<div class="recipe-detail-section"><h3>미세 조정</h3>';
    r.adjustments.forEach(a => {
      html += `<div class="adjust-row"><span class="adjust-symptom">${a.symptom}</span><span class="adjust-fix">${a.fix}</span></div>`;
    });
    html += '</div>';
  }
  
  document.getElementById('recipeDetailContent').innerHTML = html;
  openModal('recipeDetailModal');
}

function deleteRecipe() {
  if (!confirm('이 레시피를 삭제할까요?')) return;
  data.recipes = data.recipes.filter(r => r.id !== selectedRecipeId);
  saveData();
  closeModal('recipeDetailModal');
  renderRecipes();
}

// ─── Brew Log ───
function openAddBrewModal(recipeId) {
  currentBrewRating = 0;
  renderBrewStars();
  
  // Populate recipe select
  const select = document.getElementById('brewRecipeSelect');
  select.innerHTML = '<option value="">직접 입력</option>' + 
    data.recipes.map(r => `<option value="${r.id}">${r.name || r.origin}</option>`).join('');
  
  if (recipeId) {
    select.value = recipeId;
    onBrewRecipeSelect();
  }
  
  document.getElementById('brewDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('brewClicks').value = data.currentClicks || '';
  document.getElementById('brewNote').value = '';
  document.getElementById('brewAdjust').value = '';
  
  openModal('addBrewModal');
}

function brewFromRecipe() {
  closeModal('recipeDetailModal');
  openAddBrewModal(selectedRecipeId);
}

function onBrewRecipeSelect() {
  const id = document.getElementById('brewRecipeSelect').value;
  if (!id) return;
  const r = data.recipes.find(x => x.id === id);
  if (!r) return;
  document.getElementById('brewBean').value = r.name || '';
  document.getElementById('brewDripper').value = (r.dripper || '').split('—')[0].trim();
  document.getElementById('brewClicks').value = r.grind || '';
  document.getElementById('brewTemp').value = r.temp || '';
  document.getElementById('brewTime').value = r.targetTime || '';
  document.getElementById('brewDose').value = r.dose || '';
  document.getElementById('brewWater').value = r.water || '';
}

function setBrewRating(n) {
  currentBrewRating = n;
  renderBrewStars();
}

function renderBrewStars() {
  document.querySelectorAll('#brewStars span').forEach((s, i) => {
    s.classList.toggle('filled', i < currentBrewRating);
  });
}

function saveBrew() {
  const bean = document.getElementById('brewBean').value.trim();
  if (!bean) { alert('원두명을 입력해주세요.'); return; }
  
  const recipeId = document.getElementById('brewRecipeSelect').value;
  const recipe = recipeId ? data.recipes.find(r => r.id === recipeId) : null;
  
  const brew = {
    id: Date.now().toString(),
    recipeId: recipeId || null,
    bean: bean,
    dripper: document.getElementById('brewDripper').value.trim(),
    clicks: document.getElementById('brewClicks').value,
    temp: document.getElementById('brewTemp').value,
    time: document.getElementById('brewTime').value.trim(),
    dose: document.getElementById('brewDose').value,
    water: document.getElementById('brewWater').value,
    date: document.getElementById('brewDate').value,
    rating: currentBrewRating,
    note: document.getElementById('brewNote').value.trim(),
    adjust: document.getElementById('brewAdjust').value.trim(),
    origin: recipe?.origin || '',
    processing: recipe?.processing || '',
    variety: recipe?.variety || ''
  };
  
  data.brews.unshift(brew);
  
  // Update current clicks
  if (brew.clicks) {
    data.currentClicks = parseInt(brew.clicks);
    data.currentBean = brew.bean;
    data.clickHistory.unshift({ clicks: parseInt(brew.clicks), bean: brew.bean, date: new Date().toISOString() });
    updateClickBar();
    renderClickGrid();
  }
  
  saveData();
  closeModal('addBrewModal');
  renderBrews();
}

function renderBrews() {
  const container = document.getElementById('brewList');
  const search = (document.getElementById('brewSearch')?.value || '').toLowerCase();
  
  let filtered = data.brews.filter(b => {
    const searchMatch = !search || [b.bean, b.dripper, b.origin, b.note].some(f => (f||'').toLowerCase().includes(search));
    if (activeBrewFilter === 'all') return searchMatch;
    return searchMatch && (b.dripper||'').includes(activeBrewFilter);
  });

  // Filters
  const filters = document.getElementById('brewFilters');
  const drippers = [...new Set(data.brews.map(b => b.dripper).filter(Boolean))];
  filters.innerHTML = `
    <button class="filter-chip ${activeBrewFilter==='all'?'active':''}" onclick="activeBrewFilter='all';renderBrews()">전체</button>
    ${drippers.map(d => `<button class="filter-chip ${activeBrewFilter===d?'active':''}" onclick="activeBrewFilter='${d}';renderBrews()">${d}</button>`).join('')}
  `;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state"><p>추출 기록이 없습니다</p></div>';
    return;
  }

  // Group by month
  const groups = {};
  filtered.forEach(b => {
    const key = b.date ? b.date.substring(0, 7) : 'unknown';
    if (!groups[key]) groups[key] = [];
    groups[key].push(b);
  });

  let html = '';
  Object.keys(groups).sort().reverse().forEach(key => {
    const [y, m] = key.split('-');
    html += `<div class="group-header">${y}년 ${parseInt(m)}월</div>`;
    groups[key].forEach(b => {
      html += `
        <div class="card brew-card" onclick="openBrewDetail('${b.id}')">
          <div class="brew-card-top">
            <span class="brew-card-bean">${b.bean}</span>
            <span class="brew-card-date">${b.date ? formatDateShort(b.date) : ''}</span>
          </div>
          <div class="brew-card-info">${[b.dripper, b.clicks ? b.clicks+'C' : '', b.temp ? b.temp+'°C' : ''].filter(Boolean).join(' · ')}</div>
          ${b.rating ? `<div class="brew-card-stars">${'★'.repeat(b.rating)}${'☆'.repeat(5-b.rating)}</div>` : ''}
          ${b.note ? `<div class="brew-card-note">${b.note.length > 60 ? b.note.substring(0,60)+'...' : b.note}</div>` : ''}
        </div>
      `;
    });
  });
  container.innerHTML = html;
}

function openBrewDetail(id) {
  selectedBrewId = id;
  const b = data.brews.find(x => x.id === id);
  if (!b) return;
  
  let html = `
    <div class="recipe-detail-section">
      <h3>추출 정보</h3>
      <div class="recipe-detail-row"><span class="recipe-detail-label">원두</span><span class="recipe-detail-value">${b.bean}</span></div>
      ${b.date ? `<div class="recipe-detail-row"><span class="recipe-detail-label">날짜</span><span class="recipe-detail-value">${b.date}</span></div>` : ''}
      ${b.dripper ? `<div class="recipe-detail-row"><span class="recipe-detail-label">드리퍼</span><span class="recipe-detail-value">${b.dripper}</span></div>` : ''}
      ${b.clicks ? `<div class="recipe-detail-row"><span class="recipe-detail-label">클릭수</span><span class="recipe-detail-value">${b.clicks}</span></div>` : ''}
      ${b.temp ? `<div class="recipe-detail-row"><span class="recipe-detail-label">수온</span><span class="recipe-detail-value">${b.temp}°C</span></div>` : ''}
      ${b.dose ? `<div class="recipe-detail-row"><span class="recipe-detail-label">도즈</span><span class="recipe-detail-value">${b.dose}g</span></div>` : ''}
      ${b.water ? `<div class="recipe-detail-row"><span class="recipe-detail-label">물량</span><span class="recipe-detail-value">${b.water}g</span></div>` : ''}
      ${b.time ? `<div class="recipe-detail-row"><span class="recipe-detail-label">추출 시간</span><span class="recipe-detail-value">${b.time}</span></div>` : ''}
    </div>
    ${b.rating ? `<div class="recipe-detail-section"><h3>평가</h3><div style="color:var(--star);font-size:24px;">${'★'.repeat(b.rating)}${'☆'.repeat(5-b.rating)}</div></div>` : ''}
    ${b.note ? `<div class="recipe-detail-section"><h3>맛 메모</h3><p style="font-size:14px;line-height:1.6;color:var(--text-secondary);">${b.note}</p></div>` : ''}
    ${b.adjust ? `<div class="recipe-detail-section"><h3>조정 사항</h3><p style="font-size:14px;color:var(--text-secondary);">${b.adjust}</p></div>` : ''}
  `;
  
  document.getElementById('brewDetailContent').innerHTML = html;
  openModal('brewDetailModal');
}

function deleteBrew() {
  if (!confirm('이 추출 기록을 삭제할까요?')) return;
  data.brews = data.brews.filter(b => b.id !== selectedBrewId);
  saveData();
  closeModal('brewDetailModal');
  renderBrews();
}

// ─── Stats ───
function renderStats() {
  const year = parseInt(document.getElementById('statYear').value);
  const month = document.getElementById('statMonth').value;
  
  let filtered = data.brews.filter(b => {
    if (!b.date) return false;
    const d = new Date(b.date);
    if (d.getFullYear() !== year) return false;
    if (month !== 'all' && (d.getMonth() + 1) !== parseInt(month)) return false;
    return true;
  });

  const container = document.getElementById('statsContent');
  
  if (!data.brews.length) {
    container.innerHTML = '<div class="empty-state"><p>추출 기록이 없어 통계를 표시할 수 없습니다</p></div>';
    return;
  }

  const total = filtered.length;
  const avgRating = filtered.filter(b => b.rating).length ? 
    (filtered.reduce((s, b) => s + (b.rating || 0), 0) / filtered.filter(b => b.rating).length).toFixed(1) : '-';
  
  let html = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-number">${total}</div>
        <div class="stat-label">총 추출</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${avgRating}</div>
        <div class="stat-label">평균 별점</div>
      </div>
    </div>
  `;

  // Monthly chart (only if viewing full year)
  if (month === 'all') {
    html += '<div class="card"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px;">월별 추출</h3>';
    const monthly = Array(12).fill(0);
    filtered.forEach(b => { const m = new Date(b.date).getMonth(); monthly[m]++; });
    const maxM = Math.max(...monthly, 1);
    for (let i = 0; i < 12; i++) {
      html += `<div class="chart-bar-container">
        <div class="chart-bar-label"><span>${i+1}월</span><span>${monthly[i]}잔</span></div>
        <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${(monthly[i]/maxM)*100}%"></div></div>
      </div>`;
    }
    html += '</div>';
  }

  // Origin stats
  html += renderStatCategory(filtered, 'origin', '산지별');
  // Processing stats
  html += renderStatCategory(filtered, 'processing', '프로세싱별');
  // Dripper stats
  html += renderStatCategory(filtered, 'dripper', '드리퍼별');

  container.innerHTML = html;
}

function renderStatCategory(brews, field, title) {
  const counts = {};
  brews.forEach(b => {
    const val = b[field];
    if (val) counts[val] = (counts[val] || 0) + 1;
  });
  
  const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  if (!entries.length) return '';
  
  const max = entries[0][1];
  let html = `<div class="card"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px;">${title}</h3>`;
  entries.forEach(([name, count]) => {
    html += `<div class="chart-bar-container">
      <div class="chart-bar-label"><span>${name}</span><span>${count}잔</span></div>
      <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${(count/max)*100}%"></div></div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function initStatYears() {
  const select = document.getElementById('statYear');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= currentYear - 3; y--) {
    select.innerHTML += `<option value="${y}">${y}년</option>`;
  }
}

// ─── Backup / Restore ───
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `filtercoffee-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (confirm(`레시피 ${imported.recipes?.length || 0}개, 추출 기록 ${imported.brews?.length || 0}개를 가져올까요? 기존 데이터는 덮어씌워집니다.`)) {
        data = imported;
        saveData();
        location.reload();
      }
    } catch (err) {
      alert('유효하지 않은 파일입니다.');
    }
  };
  reader.readAsText(file);
}

function saveClickRange() {
  data.clickRange.min = parseInt(document.getElementById('clickMin').value) || 28;
  data.clickRange.max = parseInt(document.getElementById('clickMax').value) || 34;
  saveData();
  renderClickGrid();
}

function confirmClearData() {
  if (confirm('모든 데이터를 삭제할까요? 이 작업은 되돌릴 수 없습니다.')) {
    localStorage.removeItem(DB_KEY);
    location.reload();
  }
}

// ─── Modal Helpers ───
function openModal(id) {
  document.getElementById(id).classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
  document.body.style.overflow = '';
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
  });
});

// ─── Utilities ───
function formatDate(isoString) {
  const d = new Date(isoString);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '방금';
  if (diff < 3600000) return Math.floor(diff/60000) + '분 전';
  if (diff < 86400000) return Math.floor(diff/3600000) + '시간 전';
  if (diff < 604800000) return Math.floor(diff/86400000) + '일 전';
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ─── Init ───
function init() {
  // Load click range
  document.getElementById('clickMin').value = data.clickRange.min;
  document.getElementById('clickMax').value = data.clickRange.max;
  
  updateClickBar();
  renderClickGrid();
  renderClickHistory();
  renderRecipes();
  renderBrews();
  initStatYears();
}

init();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
