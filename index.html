<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#faf8f5" media="(prefers-color-scheme: light)">
<title>FilterCoffee</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--bg-card:#ffffff;--bg-input:#f0ece6;--text:#1a1a1a;--text-secondary:#6b6560;--text-tertiary:#9e9890;--accent:#c45e3a;--accent-dark:#a04828;--border:#e8e2da;--border-light:#f0ece6;--shadow-md:rgba(0,0,0,0.1);--star:#e8a838;--danger:#c45050;--tab-bg:rgba(255,255,255,0.85);--click-btn:#e8e2da;--click-btn-active:#c45e3a;--click-btn-text:#1a1a1a;--click-btn-active-text:#ffffff;--modal-overlay:rgba(0,0,0,0.4);--tag-bg:#f0ece6;--tag-text:#6b6560;--chart-bar:#c45e3a;--chart-bar-light:#f0d8cc}
@media(prefers-color-scheme:dark){:root{--bg:#121210;--bg-card:#1e1e1c;--bg-input:#2a2a27;--text:#ede8e2;--text-secondary:#a09a92;--text-tertiary:#706a62;--accent:#d4714e;--accent-dark:#e8845e;--border:#333330;--border-light:#2a2a27;--shadow-md:rgba(0,0,0,0.3);--tab-bg:rgba(30,30,28,0.9);--click-btn:#2a2a27;--click-btn-active:#d4714e;--click-btn-text:#ede8e2;--click-btn-active-text:#ffffff;--modal-overlay:rgba(0,0,0,0.6);--tag-bg:#2a2a27;--tag-text:#a09a92;--chart-bar:#d4714e;--chart-bar-light:#3d2820}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.click-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg-card);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,12px) 20px 12px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.click-bar-label{font-size:13px;color:var(--text-secondary);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.click-bar-value{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;color:var(--accent);line-height:1}
.click-bar-unit{font-size:14px;color:var(--text-tertiary);margin-left:4px}
.click-bar-bean{font-size:12px;color:var(--text-tertiary);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.app-content{padding-top:calc(env(safe-area-inset-top,12px)+76px);padding-bottom:calc(80px+env(safe-area-inset-bottom,0px));min-height:100dvh}
.page{display:none;padding:16px 20px;animation:fadeIn .2s ease}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--tab-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px+env(safe-area-inset-bottom,0px))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;border:none;background:none;color:var(--text-tertiary);font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:color .2s}
.tab.active{color:var(--accent)}.tab svg{width:22px;height:22px}
.section-title{font-size:22px;font-weight:700;margin-bottom:16px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;transition:box-shadow .2s}
.card:active{box-shadow:0 2px 12px var(--shadow-md)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:active{background:var(--accent-dark);transform:scale(.98)}
.btn-secondary{background:var(--bg-input);color:var(--text)}.btn-secondary:active{background:var(--border)}
.btn-danger{background:var(--danger);color:#fff}.btn-sm{padding:8px 16px;font-size:13px;width:auto}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-input);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--accent)}
.input-group textarea{resize:vertical;min-height:80px}
.tag{display:inline-block;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:500;background:var(--tag-bg);color:var(--tag-text);margin:2px 4px 2px 0}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-tertiary)}.empty-state p{font-size:15px}
.click-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.click-btn{width:64px;height:64px;border-radius:16px;border:2px solid var(--border);background:var(--click-btn);color:var(--click-btn-text);font-family:'DM Mono',monospace;font-size:22px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.click-btn.active{background:var(--click-btn-active);color:var(--click-btn-active-text);border-color:var(--click-btn-active);transform:scale(1.08);box-shadow:0 4px 16px rgba(196,94,58,.3)}
.click-btn:active{transform:scale(.95)}
.click-history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-light);font-size:14px}
.click-history-item:last-child{border-bottom:none}
.click-history-clicks{font-family:'DM Mono',monospace;font-weight:600;font-size:18px;color:var(--accent)}
.click-history-date{color:var(--text-tertiary);font-size:13px}
.click-history-bean{color:var(--text-secondary);font-size:13px}
.record-card{cursor:pointer}
.record-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.record-card-name{font-size:16px;font-weight:700;line-height:1.3;flex:1}
.record-card-date{font-size:13px;color:var(--text-tertiary);flex-shrink:0;margin-left:8px}
.record-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.record-card-stars{color:var(--star);font-size:14px;margin-top:6px}
.record-card-note{font-size:13px;color:var(--text-tertiary);margin-top:6px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.star-rating{display:flex;gap:6px}
.star-rating span{font-size:28px;cursor:pointer;color:var(--border);transition:color .15s,transform .15s}
.star-rating span.filled{color:var(--star)}.star-rating span:active{transform:scale(1.2)}
.stat-number{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--accent)}
.stat-label{font-size:13px;color:var(--text-tertiary);margin-top:2px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.chart-bar-container{margin-bottom:8px}
.chart-bar-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px;display:flex;justify-content:space-between}
.chart-bar-track{height:24px;background:var(--chart-bar-light);border-radius:8px;overflow:hidden}
.chart-bar-fill{height:100%;background:var(--chart-bar);border-radius:8px;transition:width .6s ease;min-width:2px}
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.search-bar{position:relative;margin-bottom:16px}
.search-bar input{width:100%;padding:12px 14px 12px 40px;border-radius:12px;border:1px solid var(--border);background:var(--bg-input);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none}
.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-tertiary)}
.paste-area{width:100%;min-height:120px;padding:14px;border-radius:12px;border:2px dashed var(--border);background:var(--bg-input);font-family:'DM Mono',monospace;font-size:12px;color:var(--text);outline:none;resize:vertical;transition:border-color .2s}
.paste-area:focus{border-color:var(--accent)}.paste-area::placeholder{color:var(--text-tertiary)}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:14px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--text-secondary)}.detail-value{font-weight:600;text-align:right;max-width:60%}
.pour-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.pour-step:last-child{border-bottom:none}
.pour-step-time{font-family:'DM Mono',monospace;font-weight:500;color:var(--accent);min-width:40px}
.pour-step-amount{font-family:'DM Mono',monospace;font-weight:600;min-width:50px}
.pour-step-action{color:var(--text-secondary);flex:1}
.adjust-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.adjust-row:last-child{border-bottom:none}
.adjust-symptom{font-weight:600;min-width:80px}.adjust-fix{color:var(--text-secondary)}
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:var(--modal-overlay);align-items:flex-end;justify-content:center;animation:fadeO .2s ease}
.modal-overlay.active{display:flex}@keyframes fadeO{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-card);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90dvh;overflow-y:auto;padding:24px 20px calc(24px+env(safe-area-inset-bottom,0px));animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:20px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-input);color:var(--text-secondary);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.group-header{font-size:14px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;padding:20px 0 8px}
.delete-zone{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.modal-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.modal-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;background:var(--bg-input);color:var(--text-secondary);border:none;cursor:pointer;transition:all .2s}
.modal-tab.active{background:var(--accent);color:#fff}
</style>
</head>
<body>
<div class="click-bar">
  <div>
    <div class="click-bar-label">C60 Clicks</div>
    <div><span class="click-bar-value" id="currentClickDisplay">--</span><span class="click-bar-unit">clicks</span></div>
  </div>
  <div class="click-bar-right">
    <div class="click-bar-bean" id="currentBeanDisplay"></div>
  </div>
</div>
<div class="app-content">
  <div class="page active" id="page-clicks">
    <h1 class="section-title">클릭수 설정</h1>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:20px;">현재 그라인더 클릭수를 선택하세요</p>
    <div class="click-grid" id="clickGrid"></div>
    <div class="input-group" style="margin-top:20px;"><label>원두 메모 (선택)</label><input type="text" id="clickBeanInput" placeholder="예: 에티오피아 예가체프 워시드"></div>
    <div style="margin-top:24px;"><h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">히스토리</h3><div id="clickHistory"></div></div>
  </div>
  <div class="page" id="page-records">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h1 class="section-title" style="margin-bottom:0;">기록</h1>
      <button class="btn btn-primary btn-sm" onclick="openAddRecordModal()">+ 추가</button>
    </div>
    <div class="search-bar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" placeholder="원두, 산지, 품종 검색..." id="recordSearch" oninput="renderRecords()"></div>
    <div class="filter-bar" id="recordFilters"></div>
    <div id="recordList"></div>
  </div>
  <div class="page" id="page-stats">
    <h1 class="section-title">통계</h1>
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;">
      <select id="statYear" onchange="renderStats()" style="padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;"></select>
      <select id="statMonth" onchange="renderStats()" style="padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;">
        <option value="all">전체</option><option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
      </select>
    </div>
    <div id="statsContent"></div>
  </div>
  <div class="page" id="page-settings">
    <h1 class="section-title">설정</h1>
    <div class="card"><h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">데이터 백업</h3><p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">JSON 파일로 내보내거나 가져올 수 있습니다.</p><div style="display:flex;gap:8px;"><button class="btn btn-secondary" onclick="exportData()" style="flex:1;">내보내기</button><button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" style="flex:1;">가져오기</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"></div></div>
    <div class="card"><h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">클릭수 범위</h3><div style="display:flex;gap:8px;"><div class="input-group" style="flex:1;margin-bottom:0;"><label>최소</label><input type="number" id="clickMin" value="28" onchange="saveClickRange()"></div><div class="input-group" style="flex:1;margin-bottom:0;"><label>최대</label><input type="number" id="clickMax" value="34" onchange="saveClickRange()"></div></div></div>
    <div class="card"><h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">데이터 초기화</h3><button class="btn btn-danger" onclick="confirmClearData()">전체 데이터 삭제</button></div>
    <div style="text-align:center;margin-top:40px;color:var(--text-tertiary);font-size:12px;">FilterCoffee v1.0<br>Made with Matthew</div>
  </div>
</div>
<div class="tab-bar">
  <button class="tab active" data-page="clicks" onclick="switchTab(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m10-10h-4M6 12H2m15.07-5.07l-2.83 2.83M9.76 14.24l-2.83 2.83m11.14 0l-2.83-2.83M9.76 9.76L6.93 6.93"/></svg>클릭수</button>
  <button class="tab" data-page="records" onclick="switchTab(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>기록</button>
  <button class="tab" data-page="stats" onclick="switchTab(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>통계</button>
  <button class="tab" data-page="settings" onclick="switchTab(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>설정</button>
</div>

<div class="modal-overlay" id="addRecordModal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">기록 추가</span><button class="modal-close" onclick="closeModal('addRecordModal')">&times;</button></div>
    <div class="modal-tabs"><button class="modal-tab active" onclick="switchRecordTab('paste',this)">복붙 파싱</button><button class="modal-tab" onclick="switchRecordTab('manual',this)">직접 입력</button></div>
    <div id="recordTabPaste"><div class="input-group"><label>클로드 레시피 붙여넣기</label><textarea class="paste-area" id="recipePasteArea" placeholder="클로드에서 받은 레시피를 여기에 붙여넣으세요..."></textarea></div></div>
    <div id="recordTabManual" style="display:none;">
      <div class="input-group"><label>원두명</label><input type="text" id="recBean" placeholder="예: 파나마 프란세스치 게이샤"></div>
      <div style="display:flex;gap:8px;"><div class="input-group" style="flex:1;"><label>산지</label><input type="text" id="recOrigin"></div><div class="input-group" style="flex:1;"><label>품종</label><input type="text" id="recVariety"></div></div>
      <div style="display:flex;gap:8px;"><div class="input-group" style="flex:1;"><label>프로세싱</label><input type="text" id="recProcessing" placeholder="워시드"></div><div class="input-group" style="flex:1;"><label>로스팅</label><input type="text" id="recRoasting" placeholder="라이트"></div></div>
      <div style="display:flex;gap:8px;"><div class="input-group" style="flex:1;"><label>드리퍼</label><input type="text" id="recDripper" placeholder="Orea V4"></div><div class="input-group" style="flex:1;"><label>클릭수</label><input type="number" id="recClicks"></div></div>
      <div style="display:flex;gap:8px;"><div class="input-group" style="flex:1;"><label>수온 (°C)</label><input type="number" id="recTemp"></div><div class="input-group" style="flex:1;"><label>비율</label><input type="text" id="recRatio" placeholder="1:15"></div></div>
      <div style="display:flex;gap:8px;"><div class="input-group" style="flex:1;"><label>도즈 (g)</label><input type="number" id="recDose"></div><div class="input-group" style="flex:1;"><label>물량 (g)</label><input type="number" id="recWater"></div></div>
    </div>
    <div class="input-group"><label>날짜</label><input type="date" id="recDate"></div>
    <div class="input-group"><label>별점</label><div class="star-rating" id="recStars"><span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span></div></div>
    <div class="input-group"><label>맛 메모</label><textarea id="recNote" placeholder="맛, 향, 질감 등 자유롭게..."></textarea></div>
    <button class="btn btn-primary" onclick="saveRecord()">저장</button>
  </div>
</div>

<div class="modal-overlay" id="recordDetailModal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title" id="recordDetailTitle">상세</span><button class="modal-close" onclick="closeModal('recordDetailModal')">&times;</button></div>
    <div id="recordDetailContent"></div>
    <div class="delete-zone"><button class="btn btn-danger" onclick="deleteRecord()">삭제</button></div>
  </div>
</div>

<script>
const DB='filterCoffee_v2';
let data=loadData(),curRating=0,selId=null,activeFilter='all';

function loadData(){
  const s=localStorage.getItem(DB);if(s)return JSON.parse(s);
  const v1=localStorage.getItem('filterCoffee');
  if(v1){const o=JSON.parse(v1);const m={currentClicks:o.currentClicks,currentBean:o.currentBean||'',clickRange:o.clickRange||{min:28,max:34},clickHistory:o.clickHistory||[],records:[]};
  if(o.recipes)o.recipes.forEach(r=>m.records.push({id:r.id,name:r.name,origin:r.origin,variety:r.variety,processing:r.processing,roasting:r.roasting,notes:r.notes,dripper:r.dripper,bottom:r.bottom,dose:r.dose,water:r.water,ratio:r.ratio,temp:r.temp,grind:r.grind,meloDrip:r.meloDrip,targetTime:r.targetTime,pourGuide:r.pourGuide||[],adjustments:r.adjustments||[],date:r.createdAt?.split('T')[0]||'',rating:0,note:'',raw:r.raw||''}));
  if(o.brews)o.brews.forEach(b=>m.records.push({id:b.id,name:b.bean,origin:b.origin||'',variety:b.variety||'',processing:b.processing||'',roasting:'',notes:'',dripper:b.dripper,bottom:'',dose:b.dose,water:b.water,ratio:'',temp:b.temp,grind:b.clicks,meloDrip:'',targetTime:b.time,pourGuide:[],adjustments:[],date:b.date,rating:b.rating||0,note:b.note||'',raw:''}));return m;}
  return{currentClicks:null,currentBean:'',clickRange:{min:28,max:34},clickHistory:[],records:[]};
}
function saveData(){localStorage.setItem(DB,JSON.stringify(data));}

function switchTab(el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('page-'+el.dataset.page).classList.add('active');if(el.dataset.page==='stats')renderStats();if(el.dataset.page==='records')renderRecords();}
function switchRecordTab(tab,el){document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('recordTabPaste').style.display=tab==='paste'?'block':'none';document.getElementById('recordTabManual').style.display=tab==='manual'?'block':'none';}

function renderClickGrid(){const g=document.getElementById('clickGrid');g.innerHTML='';for(let i=data.clickRange.min;i<=data.clickRange.max;i++){const b=document.createElement('button');b.className='click-btn'+(data.currentClicks===i?' active':'');b.textContent=i;b.onclick=()=>setClicks(i);g.appendChild(b);}}
function setClicks(n){const bean=document.getElementById('clickBeanInput').value.trim();data.currentClicks=n;data.currentBean=bean;data.clickHistory.unshift({clicks:n,bean,date:new Date().toISOString()});if(data.clickHistory.length>100)data.clickHistory.pop();saveData();updateClickBar();renderClickGrid();renderClickHistory();}
function updateClickBar(){document.getElementById('currentClickDisplay').textContent=data.currentClicks??'--';document.getElementById('currentBeanDisplay').textContent=data.currentBean||'';}
function renderClickHistory(){const c=document.getElementById('clickHistory');if(!data.clickHistory.length){c.innerHTML='<div class="empty-state"><p>아직 기록이 없습니다</p></div>';return;}c.innerHTML=data.clickHistory.slice(0,20).map(h=>`<div class="click-history-item"><div><div class="click-history-clicks">${h.clicks}</div>${h.bean?`<div class="click-history-bean">${h.bean}</div>`:''}</div><div class="click-history-date">${formatDate(h.date)}</div></div>`).join('');}

function parseRecipeText(text){const r={id:Date.now().toString(),raw:text,name:'',origin:'',variety:'',processing:'',roasting:'',notes:'',dripper:'',bottom:'',dose:'',water:'',ratio:'',temp:'',grind:'',meloDrip:'',targetTime:'',pourGuide:[],adjustments:[]};
const m=re=>{const x=text.match(re);return x?x[1].trim():'';};
const tM=text.match(/^(.+?)(?:\s*[—\-–]|$)/m);if(tM)r.name=tM[1].trim();
r.origin=m(/산지\s+(.+)/);r.variety=m(/품종\s+(.+)/);r.processing=m(/프로세싱\s+(.+)/);r.roasting=m(/로스팅\s+(.+)/);r.notes=m(/(?:예상\s*노트|노트)\s+(.+)/);
r.dripper=m(/드리퍼\s+(.+)/);r.bottom=m(/바텀\s*(?:추천)?[:\s]+(\w+)/);r.dose=m(/도즈\s+(\d+)g/);r.water=m(/물량\s+(\d+)g/);
const rM=text.match(/1:(\d+)/);if(rM)r.ratio='1:'+rM[1];
r.temp=m(/수온\s+(\d+)°?C/);r.grind=m(/(?:그라인드|클릭수?)\s+(\d+)\s*(?:클릭)?/);r.meloDrip=m(/멜로드립\s+(사용|미사용)/);r.targetTime=m(/(?:목표\s*)?추출\s*시간\s+~?(\d+:\d+)/);
const lines=text.split('\n'),pk=['블루밍','1차','2차','3차','드로우다운'];
lines.forEach(l=>{if(pk.some(k=>l.includes(k))){const t=l.match(/(\d+:\d+)/),a=l.match(/(\d+)g/);if(t)r.pourGuide.push({time:t[1],amount:a?a[1]+'g':'',action:l.replace(/^[\s|]+/,'').trim()});}});
const ap=/(시다|쓰다|텁텁하다|밍밍하다|너무\s*진하다)\s+(.+?)(?=\n|$)/g;let am;while((am=ap.exec(text))!==null)r.adjustments.push({symptom:am[1].trim(),fix:am[2].trim()});
if(!r.name&&r.origin)r.name=[r.origin,r.variety,r.processing].filter(Boolean).join(' ');
return r;}

function openAddRecordModal(){curRating=0;renderStars();document.getElementById('recipePasteArea').value='';document.getElementById('recDate').value=new Date().toISOString().split('T')[0];document.getElementById('recNote').value='';
['recBean','recOrigin','recVariety','recProcessing','recRoasting','recDripper','recClicks','recTemp','recRatio','recDose','recWater'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
document.querySelectorAll('.modal-tab').forEach((t,i)=>t.classList.toggle('active',i===0));document.getElementById('recordTabPaste').style.display='block';document.getElementById('recordTabManual').style.display='none';openModal('addRecordModal');}

function setRating(n){curRating=n;renderStars();}
function renderStars(){document.querySelectorAll('#recStars span').forEach((s,i)=>s.classList.toggle('filled',i<curRating));}

function saveRecord(){let rec;const isPaste=document.getElementById('recordTabPaste').style.display!=='none';
if(isPaste){const text=document.getElementById('recipePasteArea').value.trim();if(!text){alert('레시피를 붙여넣어주세요.');return;}rec=parseRecipeText(text);}
else{const bean=document.getElementById('recBean').value.trim();if(!bean){alert('원두명을 입력해주세요.');return;}
rec={id:Date.now().toString(),raw:'',name:bean,origin:document.getElementById('recOrigin').value.trim(),variety:document.getElementById('recVariety').value.trim(),processing:document.getElementById('recProcessing').value.trim(),roasting:document.getElementById('recRoasting').value.trim(),notes:'',dripper:document.getElementById('recDripper').value.trim(),bottom:'',dose:document.getElementById('recDose').value,water:document.getElementById('recWater').value,ratio:document.getElementById('recRatio').value.trim(),temp:document.getElementById('recTemp').value,grind:document.getElementById('recClicks').value,meloDrip:'',targetTime:'',pourGuide:[],adjustments:[]};}
rec.date=document.getElementById('recDate').value;rec.rating=curRating;rec.note=document.getElementById('recNote').value.trim();
if(rec.grind){data.currentClicks=parseInt(rec.grind);data.currentBean=rec.name;data.clickHistory.unshift({clicks:parseInt(rec.grind),bean:rec.name,date:new Date().toISOString()});updateClickBar();renderClickGrid();}
data.records.unshift(rec);saveData();closeModal('addRecordModal');renderRecords();}

function renderRecords(){const container=document.getElementById('recordList'),search=(document.getElementById('recordSearch')?.value||'').toLowerCase();
let filtered=data.records.filter(r=>{const sm=!search||[r.name,r.origin,r.variety,r.processing,r.dripper,r.note].some(f=>(f||'').toLowerCase().includes(search));if(activeFilter==='all')return sm;if(['워시드','내추럴','허니'].includes(activeFilter))return sm&&r.processing===activeFilter;return sm&&(r.dripper||'').includes(activeFilter);});
const fb=document.getElementById('recordFilters'),procs=[...new Set(data.records.map(r=>r.processing).filter(Boolean))],drips=[...new Set(data.records.map(r=>(r.dripper||'').split('—')[0].trim()).filter(Boolean))];
fb.innerHTML=`<button class="filter-chip ${activeFilter==='all'?'active':''}" onclick="activeFilter='all';renderRecords()">전체</button>`+procs.map(p=>`<button class="filter-chip ${activeFilter===p?'active':''}" onclick="activeFilter='${p}';renderRecords()">${p}</button>`).join('')+drips.map(d=>`<button class="filter-chip ${activeFilter===d?'active':''}" onclick="activeFilter='${d}';renderRecords()">${d}</button>`).join('');
if(!filtered.length){container.innerHTML='<div class="empty-state"><p>기록이 없습니다<br>클로드에서 받은 레시피를 붙여넣어 추가하세요</p></div>';return;}
const groups={};filtered.forEach(r=>{const key=r.date?r.date.substring(0,7):'기타';if(!groups[key])groups[key]=[];groups[key].push(r);});
let html='';Object.keys(groups).sort().reverse().forEach(key=>{if(key!=='기타'){const[y,m]=key.split('-');html+=`<div class="group-header">${y}년 ${parseInt(m)}월</div>`;}else html+=`<div class="group-header">날짜 없음</div>`;
groups[key].forEach(r=>{const ds=(r.dripper||'').split('—')[0].trim();
html+=`<div class="card record-card" onclick="openRecordDetail('${r.id}')"><div class="record-card-header"><span class="record-card-name">${r.name||'이름 없음'}</span><span class="record-card-date">${r.date?formatDateShort(r.date):''}</span></div><div class="record-card-tags">${r.processing?`<span class="tag">${r.processing}</span>`:''}${r.roasting?`<span class="tag">${r.roasting}</span>`:''}${ds?`<span class="tag">${ds}</span>`:''}${r.grind?`<span class="tag">${r.grind}C</span>`:''}${r.ratio?`<span class="tag">${r.ratio}</span>`:''}</div>${r.rating?`<div class="record-card-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>`:''}${r.note?`<div class="record-card-note">${r.note}</div>`:''}</div>`;});});
container.innerHTML=html;}

function openRecordDetail(id){selId=id;const r=data.records.find(x=>x.id===id);if(!r)return;
document.getElementById('recordDetailTitle').textContent=r.name||'상세';let html='';
if(r.rating)html+=`<div style="color:var(--star);font-size:24px;margin-bottom:16px;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>`;
if(r.note)html+=`<div class="detail-section"><h3>맛 메모</h3><p style="font-size:14px;line-height:1.6;color:var(--text-secondary);">${r.note}</p></div>`;
html+='<div class="detail-section"><h3>원두 정보</h3>';
if(r.origin)html+=`<div class="detail-row"><span class="detail-label">산지</span><span class="detail-value">${r.origin}</span></div>`;
if(r.variety)html+=`<div class="detail-row"><span class="detail-label">품종</span><span class="detail-value">${r.variety}</span></div>`;
if(r.processing)html+=`<div class="detail-row"><span class="detail-label">프로세싱</span><span class="detail-value">${r.processing}</span></div>`;
if(r.roasting)html+=`<div class="detail-row"><span class="detail-label">로스팅</span><span class="detail-value">${r.roasting}</span></div>`;
if(r.notes)html+=`<div class="detail-row"><span class="detail-label">노트</span><span class="detail-value">${r.notes}</span></div>`;
html+='</div><div class="detail-section"><h3>레시피</h3>';
if(r.dripper)html+=`<div class="detail-row"><span class="detail-label">드리퍼</span><span class="detail-value">${r.dripper}</span></div>`;
if(r.dose)html+=`<div class="detail-row"><span class="detail-label">도즈</span><span class="detail-value">${r.dose}g</span></div>`;
if(r.water)html+=`<div class="detail-row"><span class="detail-label">물량</span><span class="detail-value">${r.water}g${r.ratio?' ('+r.ratio+')':''}</span></div>`;
if(r.temp)html+=`<div class="detail-row"><span class="detail-label">수온</span><span class="detail-value">${r.temp}°C</span></div>`;
if(r.grind)html+=`<div class="detail-row"><span class="detail-label">그라인드</span><span class="detail-value">${r.grind}클릭</span></div>`;
if(r.meloDrip)html+=`<div class="detail-row"><span class="detail-label">멜로드립</span><span class="detail-value">${r.meloDrip}</span></div>`;
if(r.targetTime)html+=`<div class="detail-row"><span class="detail-label">목표 시간</span><span class="detail-value">${r.targetTime}</span></div>`;
if(r.date)html+=`<div class="detail-row"><span class="detail-label">날짜</span><span class="detail-value">${r.date}</span></div>`;
html+='</div>';
if(r.pourGuide?.length){html+='<div class="detail-section"><h3>푸어링 가이드</h3>';r.pourGuide.forEach(p=>html+=`<div class="pour-step"><div class="pour-step-time">${p.time}</div><div class="pour-step-amount">${p.amount}</div><div class="pour-step-action">${p.action}</div></div>`);html+='</div>';}
if(r.adjustments?.length){html+='<div class="detail-section"><h3>미세 조정</h3>';r.adjustments.forEach(a=>html+=`<div class="adjust-row"><span class="adjust-symptom">${a.symptom}</span><span class="adjust-fix">${a.fix}</span></div>`);html+='</div>';}
document.getElementById('recordDetailContent').innerHTML=html;openModal('recordDetailModal');}

function deleteRecord(){if(!confirm('이 기록을 삭제할까요?'))return;data.records=data.records.filter(r=>r.id!==selId);saveData();closeModal('recordDetailModal');renderRecords();}

function renderStats(){const year=parseInt(document.getElementById('statYear').value),month=document.getElementById('statMonth').value;
let filtered=data.records.filter(r=>{if(!r.date)return false;const d=new Date(r.date);if(d.getFullYear()!==year)return false;if(month!=='all'&&(d.getMonth()+1)!==parseInt(month))return false;return true;});
const c=document.getElementById('statsContent');if(!data.records.length){c.innerHTML='<div class="empty-state"><p>기록이 없어 통계를 표시할 수 없습니다</p></div>';return;}
const total=filtered.length,rated=filtered.filter(r=>r.rating),avg=rated.length?(rated.reduce((s,r)=>s+r.rating,0)/rated.length).toFixed(1):'-';
let html=`<div class="stat-grid"><div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">총 추출</div></div><div class="stat-card"><div class="stat-number">${avg}</div><div class="stat-label">평균 별점</div></div></div>`;
if(month==='all'){html+='<div class="card"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px;">월별 추출</h3>';const mo=Array(12).fill(0);filtered.forEach(r=>mo[new Date(r.date).getMonth()]++);const mx=Math.max(...mo,1);for(let i=0;i<12;i++)html+=`<div class="chart-bar-container"><div class="chart-bar-label"><span>${i+1}월</span><span>${mo[i]}잔</span></div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:${(mo[i]/mx)*100}%"></div></div></div>`;html+='</div>';}
html+=statCat(filtered,'origin','산지별')+statCat(filtered,'processing','프로세싱별')+statCat(filtered,'dripper','드리퍼별');c.innerHTML=html;}

function statCat(recs,field,title){const counts={};recs.forEach(r=>{const v=r[field];if(v)counts[v]=(counts[v]||0)+1;});const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);if(!entries.length)return'';const max=entries[0][1];let h=`<div class="card"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px;">${title}</h3>`;entries.forEach(([n,c])=>h+=`<div class="chart-bar-container"><div class="chart-bar-label"><span>${n}</span><span>${c}잔</span></div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:${(c/max)*100}%"></div></div></div>`);return h+'</div>';}

function initStatYears(){const s=document.getElementById('statYear'),y=new Date().getFullYear();for(let i=y;i>=y-3;i--)s.innerHTML+=`<option value="${i}">${i}년</option>`;}

function exportData(){const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`filtercoffee-${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(u);}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(confirm(`기록 ${imp.records?.length||0}개를 가져올까요?`)){data=imp;saveData();location.reload();}}catch(err){alert('유효하지 않은 파일입니다.');}};r.readAsText(f);}
function saveClickRange(){data.clickRange.min=parseInt(document.getElementById('clickMin').value)||28;data.clickRange.max=parseInt(document.getElementById('clickMax').value)||34;saveData();renderClickGrid();}
function confirmClearData(){if(confirm('모든 데이터를 삭제할까요?')){localStorage.removeItem(DB);localStorage.removeItem('filterCoffee');location.reload();}}

function openModal(id){document.getElementById(id).classList.add('active');document.body.style.overflow='hidden';}
function closeModal(id){document.getElementById(id).classList.remove('active');document.body.style.overflow='';}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o){o.classList.remove('active');document.body.style.overflow='';}}));

function formatDate(iso){const d=new Date(iso),now=new Date(),diff=now-d;if(diff<60000)return'방금';if(diff<3600000)return Math.floor(diff/60000)+'분 전';if(diff<86400000)return Math.floor(diff/3600000)+'시간 전';if(diff<604800000)return Math.floor(diff/86400000)+'일 전';return`${d.getMonth()+1}/${d.getDate()}`;}
function formatDateShort(s){const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()}`;}

function init(){document.getElementById('clickMin').value=data.clickRange.min;document.getElementById('clickMax').value=data.clickRange.max;updateClickBar();renderClickGrid();renderClickHistory();renderRecords();initStatYears();}
init();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
